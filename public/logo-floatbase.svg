<svg width="930" height="260" viewBox="20 45 930 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Floatbase logo</title>
  <desc id="desc">A stylized houseboat floating over waves beside the Floatbase wordmark.</desc>
  <defs>
    <linearGradient id="water" x1="86" y1="240" x2="330" y2="152" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="hull" x1="110" y1="152" x2="350" y2="246" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F3F4A"/>
      <stop offset="1" stop-color="#062A35"/>
    </linearGradient>
    <linearGradient id="sun" x1="186" y1="66" x2="288" y2="168" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FACC15"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="softShadow" x="20" y="24" width="844" height="286" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#062A35" flood-opacity="0.16"/>
    </filter>
