    <path d="M103 178H318C349 178 374 198 382 226L390 255H146C118 255 94 237 86 211L78 187C76 182 82 178 103 178Z" fill="url(#hull)"/>
    <path d="M128 134H295L326 178H108L128 134Z" fill="#FFFFFF" stroke="#062A35" stroke-width="10" stroke-linejoin="round"/>
    <path d="M145 105H286L309 134H126L145 105Z" fill="#F59E0B" stroke="#062A35" stroke-width="8" stroke-linejoin="round"/>
    <path d="M155 134V178M205 134V178M255 134V178" stroke="#062A35" stroke-width="8" stroke-linecap="round"/>
    <rect x="160" y="146" width="28" height="24" rx="3" fill="#0E7490"/>
    <rect x="211" y="146" width="28" height="24" rx="3" fill="#0E7490"/>
